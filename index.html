<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d5c63">
  <meta name="description" content="马来西亚 × 巴厘岛情侣旅行总控台">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Travel 2026">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>马来西亚 × 巴厘岛情侣旅行总控台</title>
</head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div id="offline-banner" class="network-banner" hidden>当前离线 · 已缓存的行程仍可查看</div>
  <div id="update-banner" class="network-banner update-banner" hidden>
    新版本已就绪
    <button id="refresh-app" type="button">立即更新</button>
  </div>

  <main id="main" tabindex="-1">
    <section id="view-home" class="view active" aria-labelledby="nav-home"></section>
    <section id="view-itinerary" class="view" aria-labelledby="nav-itinerary" hidden></section>
    <section id="view-bookings" class="view" aria-labelledby="nav-bookings" hidden></section>
    <section id="view-checklist" class="view" aria-labelledby="nav-checklist" hidden></section>
    <section id="view-budget" class="view" aria-labelledby="nav-budget" hidden></section>
    <section id="view-more" class="view" aria-labelledby="nav-more" hidden></section>
  </main>

  <nav class="bottom-nav" aria-label="主要导航">
    <button id="nav-home" class="nav-item active" data-view="home" type="button" aria-current="page"><span aria-hidden="true">⌂</span>首页</button>
    <button id="nav-itinerary" class="nav-item" data-view="itinerary" type="button"><span aria-hidden="true">◷</span>行程</button>
    <button id="nav-bookings" class="nav-item" data-view="bookings" type="button"><span aria-hidden="true">✈</span>预订</button>
    <button id="nav-checklist" class="nav-item" data-view="checklist" type="button"><span aria-hidden="true">✓</span>清单</button>
    <button id="nav-budget" class="nav-item" data-view="budget" type="button"><span aria-hidden="true">¥</span>预算</button>
    <button id="nav-more" class="nav-item" data-view="more" type="button"><span aria-hidden="true">•••</span>更多</button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <input id="import-file" type="file" accept="application/json" hidden>

  <script src="data/trip-data.js"></script>
  <script src="js/logic.js"></script>
  <script src="config/sync-config.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
